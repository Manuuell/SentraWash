# Reverse proxy para SentraWash API.
# Copiar a /etc/nginx/sites-available/sentrawash y enlazar a sites-enabled.
# Después de cargarlo, `sudo certbot --nginx -d sentrawash.duckdns.org` agrega
# automáticamente el bloque 443 (TLS) y la redirección 80 -> 443.
server {
    listen 80;
    listen [::]:80;
    server_name sentrawash.duckdns.org;

    # Tamaño de subida (por si luego hay fotos de vehículos, etc.).
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_read_timeout 60s;
    }
}
